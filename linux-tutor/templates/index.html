<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Tutor - Linux命令学习工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-terminal"></i>
                <span>Linux Tutor</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="learn">
                    <i class="fas fa-book"></i>
                    <span>学习模式</span>
                </a>
                <a href="#" class="nav-item" data-page="practice">
                    <i class="fas fa-laptop-code"></i>
                    <span>练习模式</span>
                </a>
                <a href="#" class="nav-item" data-page="quiz">
                    <i class="fas fa-question-circle"></i>
                    <span>测验模式</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <span>Docker版 v1.0</span>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 头部 -->
            <header class="header">
                <div class="header-left">
                    <button id="back-to-ripple" class="btn-back-to-ripple" style="display: none;" onclick="goBackToRipple()">
                        <i class="fas fa-arrow-left"></i> 返回平台
                    </button>
                    <h1 id="page-title">学习模式</h1>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索命令...">
                </div>
            </header>

            <!-- 学习模式 -->
            <div id="page-learn" class="page active">
                <div class="category-grid" id="category-grid">
                    <!-- 分类卡片将通过JS动态加载 -->
                </div>
                <div class="command-list-container" id="command-list-container" style="display: none;">
                    <button class="btn-back" onclick="showCategories()">
                        <i class="fas fa-arrow-left"></i> 返回分类
                    </button>
                    <div class="command-list" id="command-list"></div>
                </div>
                <div class="command-detail" id="command-detail" style="display: none;">
                    <button class="btn-back" onclick="showCommandList()">
                        <i class="fas fa-arrow-left"></i> 返回列表
                    </button>
                    <div id="command-detail-content"></div>
                </div>
            </div>

            <!-- 练习模式 -->
            <div id="page-practice" class="page">
                <div class="practice-container">
                    <div class="scenario-list" id="scenario-list">
                        <!-- 场景列表通过JS加载 -->
                    </div>
                    <div class="practice-area" id="practice-area" style="display: none;">
                        <div class="scenario-header">
                            <button class="btn-back" onclick="showScenarioList()">
                                <i class="fas fa-arrow-left"></i> 返回
                            </button>
                            <h2 id="scenario-title"></h2>
                            <span class="difficulty" id="scenario-difficulty"></span>
                        </div>
                        <p class="scenario-desc" id="scenario-desc"></p>
                        <div class="task-progress" id="task-progress"></div>
                        <div class="terminal-emulator" id="practice-terminal"></div>
                    </div>
                </div>
            </div>

            <!-- 测验模式 -->
            <div id="page-quiz" class="page">
                <div class="quiz-container" id="quiz-container">
                    <div class="quiz-start" id="quiz-start">
                        <h2>Linux命令测验</h2>
                        <p>测试你对Linux命令的掌握程度</p>
                        <ul class="quiz-info">
                            <li><i class="fas fa-check-circle"></i> 300道题目</li>
                            <li><i class="fas fa-clock"></i> 不限时</li>
                            <li><i class="fas fa-star"></i> 即时反馈</li>
                        </ul>
                        <div class="quiz-options-select" style="margin: 20px 0;">
                            <label style="color: var(--text-secondary); margin-right: 10px;">题目数量:</label>
                            <select id="quiz-num-select" style="padding: 8px 15px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary);">
                                <option value="10">10题（快速）</option>
                                <option value="20" selected>20题（标准）</option>
                                <option value="50">50题（挑战）</option>
                                <option value="100">100题（全面）</option>
                                <option value="300">300题（全部）</option>
                            </select>
                        </div>
                        <button class="btn-primary" onclick="startQuizWithOptions()">开始测验</button>
                    </div>
                    <div class="quiz-question" id="quiz-question" style="display: none;">
                        <div class="quiz-progress">
                            <span id="quiz-progress-text">1/10</span>
                            <div class="progress-bar">
                                <div class="progress-fill" id="quiz-progress-fill"></div>
                            </div>
                        </div>
                        <h3 id="quiz-question-text"></h3>
                        <div class="quiz-options" id="quiz-options"></div>
                    </div>
                    <div class="quiz-result" id="quiz-result" style="display: none;">
                        <h2>测验完成！</h2>
                        <div class="score-display" id="score-display"></div>
                        <button class="btn-primary" onclick="startQuiz()">重新测验</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
